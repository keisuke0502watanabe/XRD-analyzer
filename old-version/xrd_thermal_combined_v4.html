
<link rel="stylesheet" href="./shared/xrd_thermal_common.css">
<style>
.sample-item{display:flex;align-items:center;gap:7px;padding:5px 10px}
.ctrl-label{font-size:11px;color:var(--color-text-secondary)}
.ctrl-row{margin-bottom:6px}
</style>

<div id="app">
<h2 class="sr-only">XRD pattern viewer with simultaneous thermal history display</h2>

<div class="drop-zone" id="dropZone">
  <div style="font-size:18px">+</div>
  <p>.ras ファイルをドロップ、またはクリックして選択（複数可）</p>
  <input type="file" id="fileInput" accept=".ras" multiple style="display:none">
</div>

<div id="sampleList" class="sample-list"></div>

<div class="view-toggle">
  <span class="ctrl-label">レイアウト:</span>
  <div class="seg" id="segLayout">
    <button class="active" onclick="setLayout('stacked')">XRD のみ</button>
    <button onclick="setLayout('thermal')">熱履歴のみ</button>
    <button onclick="setLayout('tb')">上下同時</button>
    <button onclick="setLayout('lr')">左右同時</button>
  </div>
</div>

<div class="main-layout" id="mainLayout">
  <!-- XRD panel -->
  <div class="panel-box" id="xrdBox">
    <div class="panel-header">
      <span class="panel-title">XRD パターン</span>
      <div class="ctrl-row" style="margin:0">
        <div class="mini-seg" id="segXrdMode">
          <button class="active" onclick="setXrdMode('overlay')">Overlay</button>
          <button onclick="setXrdMode('stack')">Stack</button>
          <button onclick="setXrdMode('split-lr')">左右分割</button>
          <button onclick="setXrdMode('split-tb')">上下分割</button>
        </div>
        <span class="ctrl-label" id="offsetLabel">Offset:</span>
        <input class="num-input" type="number" id="offsetInput" value="30" step="5" min="0" max="500" oninput="redrawXrd()">
        <span class="ctrl-label">%</span>
      </div>
    </div>
    <div class="panel-header" style="border-top:none">
      <div class="ctrl-row" style="margin:0">
        <span class="ctrl-label">2θ:</span>
        <input class="num-input" type="number" id="xMin" value="2" step="0.5" onchange="redrawXrd()">
        <span class="ctrl-label">–</span>
        <input class="num-input" type="number" id="xMax" value="32" step="0.5" onchange="redrawXrd()">
        <span class="ctrl-label">°</span>
        <button class="btn-xs" onclick="document.getElementById('xMin').value=2;document.getElementById('xMax').value=32;redrawXrd()">Reset</button>
      </div>
    </div>
    <div class="panel-body" id="xrdArea">
      <div class="empty-state">ファイルをアップロードするとXRDパターンが表示されます</div>
    </div>
  </div>

  <!-- Thermal panel -->
  <div class="panel-box" id="thermalBox" style="display:none">
    <div class="panel-header">
      <span class="panel-title">熱履歴</span>
      <div class="ctrl-row" style="margin:0">
        <span class="ctrl-label">時間軸:</span>
        <div class="mini-seg" id="segUnit">
          <button class="active" onclick="setUnit('sec')">sec</button>
          <button onclick="setUnit('min')">min</button>
          <button onclick="setUnit('hour')">hour</button>
        </div>
      </div>
    </div>
    <div class="panel-body">
      <div id="thermalEmpty" class="empty-state">ファイルをアップロードすると熱履歴が表示されます</div>
      <canvas id="thermalChart" style="display:none"></canvas>
    </div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="./shared/xrd_thermal_common.js"></script>
<script>
const COLORS=['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#639922','#BA7517','#E24B4A'];
let samples=[];
let xrdCharts=[];
let thermalChart=null;
let xrdMode='overlay';
let layout='stacked';
let timeUnit='sec';

const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.onclick=()=>fileInput.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add('drag-over')};
dropZone.ondragleave=()=>dropZone.classList.remove('drag-over');
dropZone.ondrop=e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files)};
fileInput.onchange=e=>handleFiles(e.target.files);

function handleFiles(files){
  XrdThermalCommon.loadRasFiles(files,{
    sortNatural:false,
    makeColor:idx=>COLORS[(samples.length+idx)%COLORS.length],
    onSample:p=>{
      samples.push(p);
      renderAll();
    }
  });
}

function toggleVisible(i){samples[i].visible=!samples[i].visible;renderAll();}
function toggleGroup(i){samples[i].group=samples[i].group==='A'?'B':'A';renderAll();}
function removeSample(i){samples.splice(i,1);renderAll();}

function renderAll(){renderList();redrawXrd();redrawThermal();}

function renderList(){
  const el=document.getElementById('sampleList');
  const isSplit=xrdMode==='split-lr'||xrdMode==='split-tb';
  const lrLabel=xrdMode==='split-lr'?['左','右']:['上','下'];
  el.innerHTML='';
  samples.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='sample-item';
    div.style.opacity=s.visible?'1':'0.4';
    const gBtn=isSplit?`<button style="font-size:11px;padding:2px 7px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:${s.group==='A'?s.color+'22':'transparent'};color:var(--color-text-primary);cursor:pointer" onclick="toggleGroup(${i})">${s.group==='A'?lrLabel[0]:lrLabel[1]}</button>`:'';
    div.innerHTML=`<div class="color-dot" style="background:${s.color}"></div>
      <span class="sample-name">${s.name}</span>
      <span class="sample-meta">peak ${s.peakPos}° | ${s.tempStart!=null?s.tempStart.toFixed(1):'-'}°C</span>
      ${gBtn}
      <button class="eye-btn${s.visible?'':' off'}" onclick="toggleVisible(${i})">👁</button>
      <button class="remove-btn" onclick="removeSample(${i})">×</button>`;
    el.appendChild(div);
  });
}

function setLayout(l){
  layout=l;
  document.querySelectorAll('#segLayout button').forEach((b,i)=>b.classList.toggle('active',['stacked','thermal','tb','lr'][i]===l));
  const ml=document.getElementById('mainLayout');
  const xrdBox=document.getElementById('xrdBox');
  const thermalBox=document.getElementById('thermalBox');
  ml.className='main-layout'+(l==='lr'?' side-by-side':'');
  xrdBox.style.display=(l==='thermal')?'none':'block';
  thermalBox.style.display=(l==='stacked')?'none':'block';
  redrawXrd();redrawThermal();
}

function setXrdMode(m){
  xrdMode=m;
  document.querySelectorAll('#segXrdMode button').forEach((b,i)=>b.classList.toggle('active',['overlay','stack','split-lr','split-tb'][i]===m));
  document.getElementById('offsetLabel').style.display=(m==='stack')?'none':'inline';
  document.getElementById('offsetInput').style.display=(m==='stack')?'none':'inline';
  renderAll();
}

function setUnit(u){
  timeUnit=u;
  document.querySelectorAll('#segUnit button').forEach(b=>b.classList.toggle('active',b.textContent===u));
  redrawThermal();
}

function getVis(){return samples.filter(s=>s.visible);}

function getAspect(){
  if(layout==='lr') return xrdMode==='split-lr'?1.1:1.4;
  if(layout==='tb') return xrdMode==='split-lr'?1.8:2.0;
  return xrdMode==='split-lr'?1.8:2.2;
}

function buildDatasets(slist){
  const xMin=parseFloat(document.getElementById('xMin').value)||2;
  const xMax=parseFloat(document.getElementById('xMax').value)||32;
  const offsetPct=parseFloat(document.getElementById('offsetInput').value)||0;
  const maxAll=slist.length?Math.max(...slist.map(s=>s.maxI)):1;
  const datasets=[];
  if(xrdMode==='stack'){
    let cum=0;
    slist.forEach(s=>{
      const pts=s.tth.map((x,j)=>({x,y:s.intensity[j]+cum})).filter(p=>p.x>=xMin&&p.x<=xMax);
      cum+=s.maxI*1.15;
      datasets.push({label:s.name,data:pts,borderColor:s.color,borderWidth:1.2,pointRadius:0,fill:false,tension:0});
    });
  } else {
    slist.forEach((s,i)=>{
      const pts=s.tth.map((x,j)=>({x,y:s.intensity[j]+i*(maxAll*offsetPct/100)})).filter(p=>p.x>=xMin&&p.x<=xMax);
      datasets.push({label:s.name,data:pts,borderColor:s.color,borderWidth:1.2,pointRadius:0,fill:false,tension:0});
    });
  }
  return datasets;
}

function makeXrdConfig(datasets,aspect){
  const xMin=parseFloat(document.getElementById('xMin').value)||2;
  const xMax=parseFloat(document.getElementById('xMax').value)||32;
  return{type:'line',data:{datasets},options:{animation:false,parsing:false,responsive:true,maintainAspectRatio:true,aspectRatio:aspect,
    plugins:{legend:{display:true,position:'top',labels:{boxWidth:8,font:{size:10},padding:7}},
      tooltip:{callbacks:{label:d=>`${d.dataset.label}: ${Math.round(d.parsed.y)} cps`}}},
    scales:{x:{type:'linear',title:{display:true,text:'2θ (°)',font:{size:10}},min:xMin,max:xMax,ticks:{maxTicksLimit:8,font:{size:10}}},
      y:{title:{display:true,text:'Intensity (cps)',font:{size:10}},ticks:{font:{size:10}}}}}};
}

function redrawXrd(){
  xrdCharts.forEach(c=>c.destroy());xrdCharts=[];
  const area=document.getElementById('xrdArea');
  area.innerHTML='';
  if(layout==='thermal'){return;}
  const vis=getVis();
  if(!vis.length){area.innerHTML='<div class="empty-state">ファイルをアップロードするとXRDパターンが表示されます</div>';return;}
  const aspect=getAspect();
  if(xrdMode==='overlay'||xrdMode==='stack'){
    const canvas=document.createElement('canvas');
    area.appendChild(canvas);
    xrdCharts.push(new Chart(canvas.getContext('2d'),makeXrdConfig(buildDatasets(vis),aspect)));
  } else {
    const isLR=xrdMode==='split-lr';
    const labels=isLR?['左パネル','右パネル']:['上パネル','下パネル'];
    const grid=document.createElement('div');
    grid.style.cssText=`display:grid;grid-template-columns:${isLR?'1fr 1fr':'1fr'};gap:6px`;
    area.appendChild(grid);
    ['A','B'].forEach((g,gi)=>{
      const grp=vis.filter(s=>s.group===g);
      const wrap=document.createElement('div');
      wrap.style.cssText='border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden';
      const ttl=document.createElement('div');
      ttl.style.cssText='font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:5px 9px;border-bottom:0.5px solid var(--color-border-tertiary)';
      ttl.textContent=labels[gi]+`（${grp.length}件）`;
      wrap.appendChild(ttl);
      if(grp.length){
        const canvas=document.createElement('canvas');
        wrap.appendChild(canvas);grid.appendChild(wrap);
        xrdCharts.push(new Chart(canvas.getContext('2d'),makeXrdConfig(buildDatasets(grp),isLR?1.3:2.2)));
      } else {
        const em=document.createElement('div');em.className='empty-state';em.textContent='サンプルなし';
        wrap.appendChild(em);grid.appendChild(wrap);
      }
    });
  }
}

function toU(sec){
  if(timeUnit==='min')return parseFloat((sec/60).toFixed(2));
  if(timeUnit==='hour')return parseFloat((sec/3600).toFixed(3));
  return sec;
}

function redrawThermal(){
  if(layout==='stacked'){return;}
  const canvas=document.getElementById('thermalChart');
  const empty=document.getElementById('thermalEmpty');
  const valid=samples.filter(s=>s.visible&&s.timeStart&&s.timeEnd&&s.tempStart!=null);
  if(!valid.length){
    canvas.style.display='none';empty.style.display='block';
    if(thermalChart){thermalChart.destroy();thermalChart=null;}return;
  }
  canvas.style.display='block';empty.style.display='none';
  const t0=Math.min(...valid.map(s=>s.timeStart.getTime()));
  const tAspect=layout==='lr'?1.4:2.2;
  const datasets=valid.map(s=>({
    label:s.name,
    data:[{x:toU((s.timeStart-t0)/1000),y:s.tempStart},{x:toU((s.timeEnd-t0)/1000),y:s.tempEnd}],
    borderColor:s.color,backgroundColor:s.color+'33',borderWidth:2,pointRadius:5,pointHoverRadius:7,fill:false,tension:0,
    _s:s,_dur:toU((s.timeEnd-s.timeStart)/1000)
  }));
  if(thermalChart)thermalChart.destroy();
  const uLabel=timeUnit==='sec'?'秒 (sec)':timeUnit==='min'?'分 (min)':'時間 (hour)';
  thermalChart=new Chart(canvas.getContext('2d'),{type:'line',data:{datasets},options:{animation:false,parsing:false,responsive:true,maintainAspectRatio:true,aspectRatio:tAspect,
    plugins:{legend:{display:true,position:'top',labels:{boxWidth:8,font:{size:10},padding:7}},
      tooltip:{callbacks:{label:ctx=>[`${ctx.dataset.label}`,`温度: ${ctx.parsed.y.toFixed(1)} °C`,`経過: ${ctx.parsed.x.toFixed(timeUnit==='hour'?3:2)} ${timeUnit}`,`測定時間: ${ctx.dataset._dur.toFixed(timeUnit==='hour'?3:2)} ${timeUnit}`]}}},
    scales:{x:{type:'linear',title:{display:true,text:uLabel,font:{size:10}},ticks:{font:{size:10}}},
      y:{title:{display:true,text:'温度 (°C)',font:{size:10}},ticks:{font:{size:10}}}}}});
}
</script>
